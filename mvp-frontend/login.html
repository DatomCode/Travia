<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travia — Welcome Back</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>

<div class="main-container">
    <section class="image-side">
        <div class="image-overlay">
            <div>
                <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">Freshness Awaits.</h2>
                <p style="opacity: 0.8;">Log back in to manage your trades and track your orders in real-time.</p>
            </div>
        </div>
    </section>

    <section class="form-side">
        <div class="login-box">
            <div class="logo-mark">Travia<span>.</span></div>
            
            <h1>Welcome Back</h1>
            <p class="subtitle">Enter your credentials to access your account</p>

            <form action="#">
                <div class="field">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                      
                        <input type="email" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="field">
                    <label>Password</label>
                    <div class="input-wrapper">
                        
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>

                <a href="#" class="forgot-link">Forgot password?</a>

                <button type="submit" class="btn-login">
                    Sign In <i data-lucide="log-in" size="18"></i>
                </button>
            </form>

            <p class="loginfooter-text">
                Don't have an account? <a href="./auth.html">Create one now</a>
            </p>
        </div>
    </section>
</div>

<script>
    lucide.createIcons();
</script>

</body>
</html>
