<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travia — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>

<div id="toast-wrapper" class="toast-container"></div>

<div class="main-container">
    <section class="image-side">
        <div class="image-overlay">
            <div>
                <h2 style="font-size: 28px; font-weight: 800; margin-bottom: 8px;">Security First.</h2>
                <p style="opacity: 0.8;">Don't worry, it happens to the best of us. We'll get you back into your account safely.</p>
            </div>
        </div>
    </section>

    <section class="form-side">
        <div class="reset-box" id="reset-form-container">
            <div class="back-link" onclick="window.history.back()">
                <i data-lucide="arrow-left" size="18"></i> Back to Login
            </div>
            
            <h1 style="margin-top: 20px;">Forgot Password?</h1>
            <p class="subtitle">Enter the email associated with your account and we'll send a reset link.</p>

            <div class="field">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <input type="email" id="resetEmail" placeholder="john@example.com">
                </div>
            </div>

            <button class="btn-primary" onclick="handleReset()">
                Send Reset Link <i data-lucide="send" size="18"></i>
            </button>
        </div>

        <div class="reset-box success-card" id="reset-success">
            <div style="background: var(--moss); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <i data-lucide="check" color="var(--mint)" size="32"></i>
            </div>
            <h2 style="margin-bottom: 10px;">Check your email</h2>
            <p style="color: rgba(245,238,216,0.6); font-size: 14px; line-height: 1.6;">
                We've sent a password reset link to <strong id="sent-to" style="color: var(--white);"></strong>.
            </p>
            <button class="btn-outline" onclick="location.reload()">
                <i data-lucide="refresh-cw" size="16"></i> Resend Link
            </button>
        </div>
    </section>
</div>

<script src="./js/auth.js">
</script>
</body>
</html>
